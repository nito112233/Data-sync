services:
  crm-db:
    image: mysql:8.0
    container_name: crm-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: crm
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "33061:3306"
    volumes:
      - crm_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 20

  erp-db:
    image: mysql:8.0
    container_name: erp-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "33062:3306"
    volumes:
      - erp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  crm_db_data:
  erp_db_data: